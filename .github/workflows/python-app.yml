name: Update Pokaz Playlist

permissions:
  contents: write

on:
  schedule:
    # Каждые 6 часов
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    # 🔥 КЭШИРОВАНИЕ: системные пакеты (установятся один раз)
    - name: Cache apt packages
      uses: awalsh128/cache-apt-pkgs-action@latest
      with:
        packages: chromium-browser libnss3 libatk-bridge2.0-0 libdrm2 libxkbcommon0 libgbm1 libasound2t64
        version: 1.0
    
    # 🔥 КЭШИРОВАНИЕ: node_modules
    - name: Cache node modules
      id: cache-npm
      uses: actions/cache@v3
      with:
        path: |
          node_modules
          ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-
    
    - name: Install dependencies
      if: steps.cache-npm.outputs.cache-hit != 'true'
      run: npm install puppeteer
    
    # ✅ ПРОСТОЙ ЗАПУСК: без xvfb-run
    - name: Build playlist
      run: node src/build_pokaz.js
    
    - name: Check for changes
      id: git-check
      run: |
        git status --porcelain
        echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT
    
    - name: Commit and push if changed
      if: steps.git-check.outputs.changed != '0'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add playlists/pokaz_playlist.m3u8 playlists/error_log.txt
        git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
        git push
