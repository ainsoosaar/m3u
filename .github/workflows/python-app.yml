name: Update Pokaz Playlist

# Разрешаем запись в репозиторий
permissions:
  contents: write

on:
  schedule:
    # Каждые 6 часов
    - cron: '0 */6 * * *'
  # Ручной запуск
  workflow_dispatch:

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 lxml
    
    - name: Run parser
      run: |
        python scripts/playlist_updater.py
    
    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add playlist.m3u version.json
        git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
        git push
