name: Update Pokaz Playlist

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Установка OpenVPN
      - name: Install OpenVPN
        run: sudo apt-get update && sudo apt-get install -y openvpn curl

      # Создание файла с учётными данными
      - name: Create auth file
        run: |
          echo "${{ secrets.PROTONVPN_USER }}" > auth.txt
          echo "${{ secrets.PROTONVPN_PASSWORD }}" >> auth.txt
          chmod 600 auth.txt

      # Создание конфигурации OpenVPN (с исправленными отступами)
