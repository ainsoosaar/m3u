name: Update Pokaz Playlist

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          path: m3u

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: m3u/package-lock.json

      - name: Install system Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: m3u/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('m3u/package.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        working-directory: ./m3u
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
        run: npm install

      - name: Set Chromium path
        run: echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser" >> $GITHUB_ENV

      - name: Build playlist
        working-directory: ./m3u
        run: node src/build_pokaz.js

      - name: Check for changes
        id: git-check
        working-directory: ./m3u
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed != '0'
        working-directory: ./m3u
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlists/pokaz_playlist.m3u8 playlists/error_log.txt
          git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
          git push
