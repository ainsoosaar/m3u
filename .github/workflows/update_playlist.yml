      # Подключение к VPN
      - name: Connect to VPN
        run: |
          sudo openvpn --config client.ovpn --daemon --log vpn.log
          sleep 15
          echo "Current IP:"
          curl -s ifconfig.me

      - name: Build playlist
        run: node src/build_pokaz.js

      - name: Disconnect VPN
        if: always()
        run: sudo killall openvpn

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed != '0'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlists/pokaz_playlist.m3u8
          if [ -f playlists/error_log.txt ]; then git add playlists/error_log.txt; fi
          git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main