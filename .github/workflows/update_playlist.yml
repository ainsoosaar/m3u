name: Update Playlist from pokaz.me

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run playlist builder
        run: node build_pokaz.js

      - name: Commit and push updated playlist
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlists/pokaz_playlist.m3u8
          if ! git diff --quiet && ! git diff --staged --quiet; then
            git commit -m "Автоматическое обновление плейлиста $(date -u +'%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push origin HEAD:main
          else
            echo "Нет изменений для коммита"
          fi
