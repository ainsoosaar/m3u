name: Update Pokaz Playlist

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    # Кэширование node_modules (ключ на основе package.json)
    - name: Cache node modules
      id: cache-npm
      uses: actions/cache@v3
      with:
        path: node_modules
        key: ${{ runner.os }}-node-${{ hashFiles('**/package.json') }}
    
    # Установка зависимостей только если нет кэша
    - name: Install dependencies
      if: steps.cache-npm.outputs.cache-hit != 'true'
      run: npm install puppeteer-core
    
    # Установка системного Chromium (кэшируется автоматически)
    - name: Install Chromium
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser
    
    # Явно указываем путь к Chromium
    - name: Set Chromium path
      run: |
        echo "PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser" >> $GITHUB_ENV
    
    - name: Build playlist
      run: node src/build_pokaz.js
    
    - name: Check for changes
      id: git-check
      run: |
        git status --porcelain
        echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT
    
    - name: Commit and push if changed
      if: steps.git-check.outputs.changed != '0'
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add playlists/pokaz_playlist.m3u8 playlists/error_log.txt
        git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
        git push