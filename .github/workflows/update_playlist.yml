name: Update Pokaz Playlist

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/puppeteer/puppeteer:24.15.0
      options: --pull always --user root

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          path: m3u

      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: m3u/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('m3u/package.json') }}

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        working-directory: ./m3u
        env:
          PUPPETEER_SKIP_DOWNLOAD: true   # не скачивать браузер при npm install
        run: npm install

      # Устанавливаем браузер Chrome через npx
      - name: Install Chrome browser
        working-directory: ./m3u
        env:
          PUPPETEER_CACHE_DIR: /github/home/.cache/puppeteer
        run: npx puppeteer browsers install chrome

      - name: Build playlist
        working-directory: ./m3u
        env:
          PUPPETEER_CACHE_DIR: /github/home/.cache/puppeteer
        run: node src/build_pokaz.js

      - name: Check for changes
        id: git-check
        working-directory: ./m3u
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed != '0'
        working-directory: ./m3u
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlists/pokaz_playlist.m3u8 playlists/error_log.txt
          git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
          git push
