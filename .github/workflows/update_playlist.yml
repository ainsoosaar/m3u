name: Update Pokaz Playlist

permissions:
  contents: write

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn curl

      - name: Create auth file
        run: |
          echo "${{ secrets.PROTONVPN_USER }}" > auth.txt
          echo "${{ secrets.PROTONVPN_PASSWORD }}" >> auth.txt
          chmod 600 auth.txt

      - name: Prepare OpenVPN config
        run: |
          echo "${{ secrets.OPENVPN_CONFIG }}" > client.ovpn
          chmod 600 client.ovpn

      - name: Connect to VPN
        id: vpn
        run: |
          sudo openvpn --config client.ovpn --log vpn.log &
          echo $! > vpn.pid
          sleep 15
          echo "Current IP:"
          curl -s ifconfig.me

      - name: Build playlist
        run: node src/build_pokaz.js

      - name: Disconnect VPN
        if: always()
        run: |
          if [ -f vpn.pid ]; then
            sudo kill $(cat vpn.pid) || true
            rm vpn.pid
          fi

      - name: Check for changes
        id: git-check
        run: |
          git status --porcelain
          echo "changed=$(git status --porcelain | wc -l)" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed != '0'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add playlists/pokaz_playlist.m3u8
          if [ -f playlists/error_log.txt ]; then git add playlists/error_log.txt; fi
          git commit -m "Auto-update playlist $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
